name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  repository_dispatch:
    types:
      - content-updated
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      PUBLIC_BASE_PATH: /
      ENABLE_CONTENT_SYNC: true
      CONTENT_REPO_URL: https://github.com/Admilkk/Mizuki-Content.git
      BILI_SESSDATA: ${{ secrets.BILI_SESSDATA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.22.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site (sync content, skip Pagefind)
        run: pnpm sync-content && pnpm astro build && node scripts/compress-fonts.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
